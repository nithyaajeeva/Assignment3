<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Quiz App</title>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #quiz-container {
      background: #fff;
      border-radius: 16px;
      padding: 30px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      width: 420px;
      position: relative;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    #timer {
      position: absolute;
      top: 10px;
      right: 20px;
      font-weight: bold;
      color: #e91e63;
    }

    #progress-container {
      background: #ddd;
      height: 10px;
      border-radius: 5px;
      margin: 20px 0 10px;
      overflow: hidden;
    }

    #progress-bar {
      height: 10px;
      width: 0%;
      background: #4caf50;
      transition: width 0.3s ease;
    }

    #progress-text {
      text-align: center;
      font-size: 14px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      background: #f4f4f4;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
    }

    label:hover {
      background: #e0e0e0;
    }

    input[type="radio"] {
      margin-right: 10px;
    }

    #buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    button:hover {
      background: #388e3c;
    }
  </style>
</head>
<body>

  <div id="quiz-container">
    <div id="timer">Time: 60s</div>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
    <p id="progress-text"></p>

    <h2 id="question"></h2>

    <form id="quiz-form">
      <label><input type="radio" name="answer" value="a"><span id="option-a"></span></label>
      <label><input type="radio" name="answer" value="b"><span id="option-b"></span></label>
      <label><input type="radio" name="answer" value="c"><span id="option-c"></span></label>
      <label><input type="radio" name="answer" value="d"><span id="option-d"></span></label>
    </form>

    <div id="buttons">
      <button id="prev-btn">Previous</button>
      <button id="next-btn">Next</button>
      <button id="submit-btn">Submit</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "What does HTML stand for?",
        a: "Hyper Text Markup Language",
        b: "HighText Machine Language",
        c: "Hyperlink and Text Markup Language",
        d: "Home Tool Markup Language",
        correct: "a"
      },
      {
        question: "What does CSS stand for?",
        a: "Computer Style Sheets",
        b: "Cascading Style Sheets",
        c: "Creative Style System",
        d: "Colorful Style Syntax",
        correct: "b"
      },
      {
        question: "Which tag is used to include JavaScript in HTML?",
        a: "<javascript>",
        b: "<js>",
        c: "<script>",
        d: "<code>",
        correct: "c"
      },
      {
        question: "Which of the following is not a programming language?",
        a: "Python",
        b: "Java",
        c: "HTML",
        d: "C++",
        correct: "c"
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 60;
    let timerInterval;

    let userAnswers = new Array(quizData.length).fill(null);

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function loadQuiz() {
      const q = quizData[currentQuestion];

      document.getElementById("question").innerText = q.question;
      document.getElementById("option-a").innerText = q.a;
      document.getElementById("option-b").innerText = q.b;
      document.getElementById("option-c").innerText = q.c;
      document.getElementById("option-d").innerText = q.d;

      document.querySelectorAll('input[name="answer"]').forEach(ans => {
        ans.checked = (ans.value === userAnswers[currentQuestion]);
      });

      updateProgress();
    }

    function saveAnswer() {
      const selected = document.querySelector('input[name="answer"]:checked');
      if (selected) {
        userAnswers[currentQuestion] = selected.value;
      }
    }

    function updateProgress() {
      const progressPercent = ((currentQuestion + 1) / quizData.length) * 100;
      document.getElementById("progress-bar").style.width = progressPercent + "%";
      document.getElementById("progress-text").innerText =
        `${currentQuestion + 1} / ${quizData.length}`;
    }

    function calculateScore() {
      score = 0;
      for (let i = 0; i < quizData.length; i++) {
        if (userAnswers[i] === quizData[i].correct) {
          score++;
        }
      }
    }

    function showResult(message = "Quiz Completed!") {
      clearInterval(timerInterval);
      calculateScore();

      document.getElementById("quiz-container").innerHTML = `
        <h2>${message}</h2>
        <p>Your score: <strong>${score}</strong> / ${quizData.length}</p>
        <button onclick="location.reload()">Restart Quiz</button>
      `;
    }

    document.getElementById("next-btn").addEventListener("click", function(e) {
      e.preventDefault();
      saveAnswer();
      if (currentQuestion < quizData.length - 1) {
        currentQuestion++;
        loadQuiz();
      } else {
        showResult();
      }
    });

    document.getElementById("prev-btn").addEventListener("click", function(e) {
      e.preventDefault();
      saveAnswer();
      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuiz();
      }
    });

    document.getElementById("submit-btn").addEventListener("click", function(e) {
      e.preventDefault();
      saveAnswer();
      showResult("Quiz Submitted!");
    });

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
          showResult("Time's up!");
        }
      }, 1000);
    }

    window.onload = function() {
      shuffle(quizData);
      loadQuiz();
      startTimer();
    };
  </script>

</body>
</html>
